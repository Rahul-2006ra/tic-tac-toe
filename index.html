<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --x-color: #ff6b6b;
    --o-color: #4ecdc4;
    --accent: #ffd93d;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --glow-x: rgba(255,107,107,0.3);
    --glow-o: rgba(78,205,196,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    padding: 20px;
  }

  /* SCREENS */
  .screen { display: none; animation: fadeIn 0.4s ease; }
  .screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* HEADER */
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--x-color), var(--o-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* MODE BUTTONS */
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .mode-btn {
    padding: 18px 12px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
  }

  .mode-btn .mode-icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
  .mode-btn .mode-label { font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; }
  .mode-btn .mode-sub { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

  .mode-btn:hover, .mode-btn.selected {
    border-color: var(--accent);
    background: rgba(255,217,61,0.08);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(255,217,61,0.1);
  }

  /* INPUTS */
  .input-group { margin-bottom: 14px; }
  .input-group label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .input-group input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus { border-color: var(--accent); }
  .input-group input::placeholder { color: var(--text-muted); }

  .input-x input:focus { border-color: var(--x-color); }
  .input-o input:focus { border-color: var(--o-color); }

  /* PRIMARY BTN */
  .btn-primary {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--x-color), var(--o-color));
    color: #0a0a0f;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(255,107,107,0.3);
  }

  .btn-secondary {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }

  /* ── GAME SCREEN ── */
  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .round-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
  }

  /* SCOREBOARD */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    margin-bottom: 20px;
    align-items: center;
  }

  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .score-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 3px 3px 0 0;
  }

  .score-card.x-card::before { background: var(--x-color); }
  .score-card.o-card::before { background: var(--o-color); }

  .score-card.active-turn {
    border-color: currentColor;
    box-shadow: 0 0 20px currentColor;
  }

  .score-card.x-card.active-turn { color: var(--x-color); border-color: var(--x-color); box-shadow: 0 0 20px var(--glow-x); }
  .score-card.o-card.active-turn { color: var(--o-color); border-color: var(--o-color); box-shadow: 0 0 20px var(--glow-o); }

  .score-name {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .score-mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    margin: 2px 0;
  }

  .score-card.x-card .score-mark { color: var(--x-color); }
  .score-card.o-card .score-mark { color: var(--o-color); }

  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    line-height: 1;
  }

  .draw-score {
    text-align: center;
  }

  .draw-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
  }

  .draw-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--accent);
  }

  /* STATUS */
  .status-bar {
    text-align: center;
    margin-bottom: 16px;
    min-height: 28px;
  }

  .status-text {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .status-text .player-name { font-weight: 700; }
  .status-text .x-name { color: var(--x-color); }
  .status-text .o-name { color: var(--o-color); }

  /* BOARD */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .cell {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .cell:hover:not(.taken) {
    background: var(--surface2);
    border-color: var(--accent);
    transform: scale(1.03);
  }

  .cell.taken { cursor: default; }

  .cell.x-cell {
    color: var(--x-color);
    border-color: rgba(255,107,107,0.3);
    background: rgba(255,107,107,0.06);
    animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cell.o-cell {
    color: var(--o-color);
    border-color: rgba(78,205,196,0.3);
    background: rgba(78,205,196,0.06);
    animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cell.winner-cell {
    animation: winPulse 0.6s ease forwards;
  }

  .cell.x-cell.winner-cell {
    background: rgba(255,107,107,0.18);
    border-color: var(--x-color);
    box-shadow: 0 0 20px var(--glow-x), inset 0 0 20px var(--glow-x);
  }

  .cell.o-cell.winner-cell {
    background: rgba(78,205,196,0.18);
    border-color: var(--o-color);
    box-shadow: 0 0 20px var(--glow-o), inset 0 0 20px var(--glow-o);
  }

  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes winPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  /* RESULT OVERLAY */
  .result-overlay {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
    animation: fadeIn 0.4s ease;
  }

  .result-overlay.show { display: block; }

  .result-emoji { font-size: 2.5rem; margin-bottom: 8px; }

  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }

  .result-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; }

  .result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  .btn-next {
    padding: 10px 24px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--x-color), var(--o-color));
    color: #0a0a0f;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,107,0.3); }

  /* FINAL SCREEN */
  .final-trophy { font-size: 4rem; text-align: center; margin-bottom: 12px; }

  .final-winner {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 4px;
    text-align: center;
    background: linear-gradient(135deg, var(--accent), var(--x-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .final-sub { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 24px; }

  .final-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 8px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
  }

  .stat-label { font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }

  /* POSITION GUIDE */
  .pos-guide {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    max-width: 100px;
  }

  .pos-cell {
    aspect-ratio: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    color: var(--text-muted);
    font-weight: 600;
  }

  /* Computer thinking */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .thinking { animation: blink 0.8s ease infinite; color: var(--o-color); }

  /* Confetti particles */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 100; overflow: hidden; }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Responsive */
  @media (max-width: 400px) {
    .logo { font-size: 2.8rem; }
    .cell { font-size: 2.2rem; border-radius: 10px; }
    .mode-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div id="confettiWrap" class="confetti-wrap"></div>

<div class="wrapper">

  <!-- ── SETUP SCREEN ── -->
  <div id="setupScreen" class="screen active">
    <div class="logo">TIC TAC TOE</div>
    <p class="tagline">Classic · Strategic · Competitive</p>

    <div class="card">
      <div class="card-title">⚡ Select Mode</div>
      <div class="mode-grid">
        <button class="mode-btn selected" id="modeBtn1" onclick="selectMode(1)">
          <span class="mode-icon">👥</span>
          <div class="mode-label">PVP</div>
          <div class="mode-sub">Player vs Player</div>
        </button>
        <button class="mode-btn" id="modeBtn2" onclick="selectMode(2)">
          <span class="mode-icon">🤖</span>
          <div class="mode-label">PVC</div>
          <div class="mode-sub">Player vs Computer</div>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">✏️ Player Names</div>
      <div class="input-group input-x">
        <label>Player X</label>
        <input type="text" id="nameX" placeholder="Enter name…" maxlength="14">
      </div>
      <div class="input-group input-o" id="nameOGroup">
        <label>Player O</label>
        <input type="text" id="nameO" placeholder="Enter name…" maxlength="14">
      </div>
      <button class="btn-primary" onclick="startGame()">START GAME</button>
    </div>
  </div>

  <!-- ── GAME SCREEN ── -->
  <div id="gameScreen" class="screen">
    <div class="game-header">
      <div class="round-badge" id="roundBadge">ROUND 1</div>
      <button class="btn-secondary" onclick="goHome()">← HOME</button>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="score-card x-card" id="scoreX">
        <div class="score-name" id="scoreNameX">Player X</div>
        <div class="score-mark">✕</div>
        <div class="score-num" id="scoreNumX">0</div>
      </div>
      <div class="draw-score">
        <span class="draw-label">Draw</span>
        <div class="draw-num" id="scoreNumD">0</div>
      </div>
      <div class="score-card o-card" id="scoreO">
        <div class="score-name" id="scoreNameO">Player O</div>
        <div class="score-mark">○</div>
        <div class="score-num" id="scoreNumO">0</div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <div class="status-text" id="statusText">Loading…</div>
    </div>

    <!-- Board -->
    <div class="board" id="board">
      <div class="cell" onclick="handleClick(0)"></div>
      <div class="cell" onclick="handleClick(1)"></div>
      <div class="cell" onclick="handleClick(2)"></div>
      <div class="cell" onclick="handleClick(3)"></div>
      <div class="cell" onclick="handleClick(4)"></div>
      <div class="cell" onclick="handleClick(5)"></div>
      <div class="cell" onclick="handleClick(6)"></div>
      <div class="cell" onclick="handleClick(7)"></div>
      <div class="cell" onclick="handleClick(8)"></div>
    </div>

    <!-- Result overlay -->
    <div class="result-overlay" id="resultOverlay">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <div class="result-title" id="resultTitle">Player X Wins!</div>
      <div class="result-subtitle" id="resultSubtitle">Great move!</div>
      <div class="result-actions">
        <button class="btn-next" onclick="nextRound()">NEXT ROUND</button>
        <button class="btn-secondary" onclick="showFinal()">END MATCH</button>
      </div>
    </div>
  </div>

  <!-- ── FINAL SCREEN ── -->
  <div id="finalScreen" class="screen">
    <div class="final-trophy" id="finalTrophy">🏆</div>
    <div class="final-winner" id="finalWinner">Player X Wins!</div>
    <div class="final-sub" id="finalSub">Match Complete</div>

    <div class="final-stats" id="finalStats"></div>

    <button class="btn-primary" onclick="goHome()">PLAY AGAIN</button>
  </div>

</div>

<script>
  // ── STATE ──
  let mode = 1;
  let names = { X: 'Player X', O: 'Player O' };
  let scores = { X: 0, O: 0, Draw: 0 };
  let board = [];
  let currentPlayer = 'X';
  let gameActive = false;
  let roundNumber = 1;

  const WIN_CONDITIONS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  // ── SETUP ──
  function selectMode(m) {
    mode = m;
    document.getElementById('modeBtn1').classList.toggle('selected', m === 1);
    document.getElementById('modeBtn2').classList.toggle('selected', m === 2);
    const oGroup = document.getElementById('nameOGroup');
    const oInput = document.getElementById('nameO');
    if (m === 2) {
      oGroup.style.opacity = '0.4';
      oInput.disabled = true;
      oInput.placeholder = 'Computer 🤖';
    } else {
      oGroup.style.opacity = '1';
      oInput.disabled = false;
      oInput.placeholder = 'Enter name…';
    }
  }

  function startGame() {
    const xName = document.getElementById('nameX').value.trim() || 'Player X';
    const oName = mode === 1
      ? (document.getElementById('nameO').value.trim() || 'Player O')
      : 'Computer 🤖';

    names = { X: xName, O: oName };
    scores = { X: 0, O: 0, Draw: 0 };
    roundNumber = 1;

    document.getElementById('scoreNameX').textContent = xName;
    document.getElementById('scoreNameO').textContent = oName;
    updateScoreboard();

    showScreen('gameScreen');
    startRound();
  }

  // ── ROUND ──
  function startRound() {
    board = Array(9).fill('');
    currentPlayer = 'X';
    gameActive = true;

    document.getElementById('roundBadge').textContent = `ROUND ${roundNumber}`;
    document.getElementById('resultOverlay').classList.remove('show');

    renderBoard();
    updateTurnHighlight();
    setStatus(`<span class="player-name x-name">${names.X}</span>'s turn`);
  }

  function renderBoard() {
    const cells = document.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
      cell.className = 'cell';
      cell.textContent = board[i] === 'X' ? '✕' : board[i] === 'O' ? '○' : '';
      if (board[i]) {
        cell.classList.add('taken', board[i] === 'X' ? 'x-cell' : 'o-cell');
      }
    });
  }

  function handleClick(index) {
    if (!gameActive || board[index]) return;
    if (mode === 2 && currentPlayer === 'O') return;

    makeMove(index, currentPlayer);
  }

  function makeMove(index, player) {
    board[index] = player;
    const cell = document.querySelectorAll('.cell')[index];
    cell.textContent = player === 'X' ? '✕' : '○';
    cell.classList.add('taken', player === 'X' ? 'x-cell' : 'o-cell');

    const winner = checkWinner();
    if (winner) {
      highlightWinner(winner.cells);
      if (winner.player === 'Draw') {
        scores.Draw++;
        updateScoreboard();
        showResult('draw', null);
      } else {
        scores[winner.player]++;
        updateScoreboard();
        showResult('win', winner.player);
      }
      gameActive = false;
      return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    updateTurnHighlight();

    if (mode === 2 && currentPlayer === 'O' && gameActive) {
      setStatus(`<span class="thinking">Computer 🤖 is thinking…</span>`);
      setTimeout(computerMove, 550);
    } else {
      const cls = currentPlayer === 'X' ? 'x-name' : 'o-name';
      setStatus(`<span class="player-name ${cls}">${names[currentPlayer]}</span>'s turn`);
    }
  }

  function computerMove() {
    if (!gameActive) return;

    // Try to win
    let move = findBestMove('O');
    // Block player
    if (move === -1) move = findBestMove('X');
    // Center
    if (move === -1 && board[4] === '') move = 4;
    // Random
    if (move === -1) {
      const available = board.map((v, i) => v === '' ? i : -1).filter(i => i !== -1);
      move = available[Math.floor(Math.random() * available.length)];
    }

    makeMove(move, 'O');
  }

  function findBestMove(player) {
    for (const cond of WIN_CONDITIONS) {
      const vals = cond.map(i => board[i]);
      const empty = cond.find(i => board[i] === '');
      if (vals.filter(v => v === player).length === 2 && empty !== undefined) return empty;
    }
    return -1;
  }

  function checkWinner() {
    for (const cond of WIN_CONDITIONS) {
      const [a, b, c] = cond;
      if (board[a] && board[a] === board[b] && board[b] === board[c]) {
        return { player: board[a], cells: cond };
      }
    }
    if (board.every(v => v !== '')) return { player: 'Draw', cells: [] };
    return null;
  }

  function highlightWinner(cells) {
    cells.forEach(i => {
      document.querySelectorAll('.cell')[i].classList.add('winner-cell');
    });
  }

  function showResult(type, player) {
    const overlay = document.getElementById('resultOverlay');
    const emoji = document.getElementById('resultEmoji');
    const title = document.getElementById('resultTitle');
    const sub = document.getElementById('resultSubtitle');

    if (type === 'draw') {
      emoji.textContent = '🤝';
      title.textContent = "It's a Draw!";
      title.style.color = 'var(--accent)';
      sub.textContent = 'Both players played well';
    } else {
      emoji.textContent = '🎉';
      title.textContent = `${names[player]} Wins!`;
      title.style.color = player === 'X' ? 'var(--x-color)' : 'var(--o-color)';
      sub.textContent = `Round ${roundNumber} goes to ${names[player]}`;
      spawnConfetti();
    }

    setStatus('');
    overlay.classList.add('show');
  }

  function nextRound() {
    roundNumber++;
    startRound();
  }

  function showFinal() {
    const trophy = document.getElementById('finalTrophy');
    const winnerEl = document.getElementById('finalWinner');
    const sub = document.getElementById('finalSub');
    const stats = document.getElementById('finalStats');

    if (scores.X > scores.O) {
      trophy.textContent = '🏆';
      winnerEl.textContent = `${names.X} Wins!`;
      winnerEl.style.background = 'linear-gradient(135deg, var(--accent), var(--x-color))';
      winnerEl.style['-webkit-background-clip'] = 'text';
      winnerEl.style['-webkit-text-fill-color'] = 'transparent';
      spawnConfetti();
    } else if (scores.O > scores.X) {
      trophy.textContent = '🏆';
      winnerEl.textContent = `${names.O} Wins!`;
      winnerEl.style.background = 'linear-gradient(135deg, var(--accent), var(--o-color))';
      winnerEl.style['-webkit-background-clip'] = 'text';
      winnerEl.style['-webkit-text-fill-color'] = 'transparent';
      spawnConfetti();
    } else {
      trophy.textContent = '🤝';
      winnerEl.textContent = "It's a Tie!";
      winnerEl.style.background = 'linear-gradient(135deg, var(--x-color), var(--o-color))';
      winnerEl.style['-webkit-background-clip'] = 'text';
      winnerEl.style['-webkit-text-fill-color'] = 'transparent';
    }

    sub.textContent = `${roundNumber} round${roundNumber > 1 ? 's' : ''} played`;

    stats.innerHTML = `
      <div class="stat-box">
        <div class="stat-val" style="color:var(--x-color)">${scores.X}</div>
        <div class="stat-label">${names.X}</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--accent)">${scores.Draw}</div>
        <div class="stat-label">Draws</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--o-color)">${scores.O}</div>
        <div class="stat-label">${names.O}</div>
      </div>
    `;

    showScreen('finalScreen');
  }

  // ── HELPERS ──
  function setStatus(html) {
    document.getElementById('statusText').innerHTML = html;
  }

  function updateScoreboard() {
    document.getElementById('scoreNumX').textContent = scores.X;
    document.getElementById('scoreNumO').textContent = scores.O;
    document.getElementById('scoreNumD').textContent = scores.Draw;
  }

  function updateTurnHighlight() {
    document.getElementById('scoreX').classList.toggle('active-turn', currentPlayer === 'X');
    document.getElementById('scoreO').classList.toggle('active-turn', currentPlayer === 'O');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goHome() {
    showScreen('setupScreen');
    document.getElementById('nameX').value = '';
    document.getElementById('nameO').value = '';
    selectMode(1);
  }

  // ── CONFETTI ──
  function spawnConfetti() {
    const wrap = document.getElementById('confettiWrap');
    wrap.innerHTML = '';
    const colors = ['#ff6b6b','#4ecdc4','#ffd93d','#a8e6cf','#ff8b94','#c7f2a4'];
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}%;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${Math.random() * 8 + 4}px;
        height: ${Math.random() * 8 + 4}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${Math.random() * 2 + 1.5}s;
        animation-delay: ${Math.random() * 0.5}s;
      `;
      wrap.appendChild(el);
    }
    setTimeout(() => wrap.innerHTML = '', 4000);
  }

  // Init
  selectMode(1);
</script>
</body>
</html>
